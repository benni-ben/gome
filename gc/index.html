    <h1 id="header">Gome</h1>
    <h1 id="header2">Gome</h1>
    <input type="text" id="searchBar" title="Search for currently avaliable ganes." placeholder="Search for gomes"
        autocomplete="on" spellcheck="false" aria-label="Search for gomes">
    </div>
    <!--menus-->
    <div id="settingsOverlay"></div>
    <div id="settingsMenuMain">
        <div id="settingsMenuHeader">Settings
            <button id="closeBtn" onclick="closeSettingsMenu()" aria-label="Close settings menu">✕</button>
        </div>
        <div id="menuDivider"></div>
        <div id="settingsContent"></div>
    </div>

    <div id="feedbackMenuMain">
        <div id="feedbackMenuHeader">Send Feedback
            <button id="closeBtn" onclick="closeFeedbackMenu()" aria-label="Close feedback menu">✕</button>
        </div>
        <div id="menuDivider"></div>
        <div id="feedbackContent">
            <textarea id="feedbackText" placeholder="Enter your feedback here..."
                aria-label="Feedback text area"></textarea>
            <button id="submit" onclick="handleSendFeedback()">Send Feedback</button>
            <div id="feedbackStatus" role="status" aria-live="polite" aria-atomic="true"></div>
        </div>
    </div>

    <div id="analyticsMenuMain">
        <div id="analyticsMenuHeader">Analytics
            <button id="closeBtn" onclick="closeAnalyticsMenu()" aria-label="Close analytics menu">✕</button>
        </div>
        <div id="menuDivider"></div>
        <div id="analyticsCellContainer">
        </div>
    </div>
    <div id="infodiv">
        <h4 id="time" title="The current time according to your device."></h4>
        <h4 id="date" title="The current date according to your device."></h4>
        <h4 id="gameCount" title="The number of games that are currently avaliable on the website."></h4>
        <h4 id="version" title="The current version you are running on. May change if you reload."></h4>
    </div>
    <div id="horizontalLine"></div>
    <div id="gameContainer"></div>
    <div id="randText" onclick="getRandomText()"></div>
    <div id="notification" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="js/notifications.js"></script>
<script src="js/developer.js"></script>
<script src="js/settingsFunctions.js"></script>
<script src="js/utilities.js"></script>
<script src="js/headerAndInfo.js"></script>
<script src="js/gameLoader.js"></script>
<script src="js/uiController.js"></script>
<script src="js/analytics.js"></script>
<script src="js/analyticsDisplay.js"></script>
<script src="js/randomText.js"></script>
<script>
    const currentVersion = "1.6.3";
    const changes = "Feedback working again!!!!!!!!!";
    const gameContainer = document.getElementById("gameContainer");
    const gameCountElement = document.getElementById("gameCount");
    document.documentElement.style.setProperty("--middle-fade-random-color", getRandomColor());
    setInterval(() => {
        getAndSetTimeAndDate();
    }, 2000);
    document.addEventListener("DOMContentLoaded", () => {
        const versionElement = document.getElementById("version");
        const overlay = document.getElementById("settingsOverlay");
        versionElement.textContent = "Version: " + currentVersion;
        const feedbackButton = document.getElementsByClassName("Feedback")[0];
        const submit = document.getElementById("submit");
        const feedbackText = document.getElementById("feedbackText");
        loadSettings();
        getAndSetTimeAndDate();
        gameLoader();
        createSettings();
        getRandomText();
        storeLastVersionAcessed(currentVersion);
        overlay.addEventListener("click", (e) => {
            closeFeedbackMenu();
            closeSettingsMenu();
            closeAnalyticsMenu();
        });
        async function sendFeedback(message) {
            const response = await fetch("./netlify/functions/discord-webhook.js", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ feedback: message })
            });

            return response.ok;
        }

        if (submit) {
            submit.addEventListener("click", async () => {
                const message = feedbackText.value.trim();
                if (message) {
                    notify("Thank you for your feedback!", "Feedback Sent", "specialday.svg", "8000");
                    feedbackText.value = "";
                    const success = await sendFeedback(message);
                    if (!success) {
                        console.error("Failed to send feedback!");
                    }
                } else {
                    notify("Please enter some feedback.", "Empty Feedback", "error.svg", "5000");
                }
            });
        }
        if (randomNumber(1, 90) == 1) {
            notify("If you have any suggestions or just want to say thank you, remember that there is a feedback button at the top!", "info.svg", 10000);
        }
    });
</script>
