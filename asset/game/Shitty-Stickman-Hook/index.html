<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Bickman Stook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0" />

    <style>
        html,
        body {
            position: absolute;
            top: 0px;
            left: 0px;
            margin: 0;
            padding: 0;
            border: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: black;
        }

        canvas {
            width: 100%;
            animation: annoying 5s infinite cubic-bezier(1.00, -0.50, 0.01, 1.50);
        }

        @keyframes annoying {

            0%,
            100% {
                filter: blur(0px) brightness(1) contrast(1) hue-rotate(0deg);
            }
            50% {
                filter: blur(4px) brightness(1) contrast(4) hue-rotate(120deg);
            }

        }
    </style>
    <!-- Poki SDK -->
    <script src="patch/js/poki-sdk.js"></script>
</head>

<body>
    <script src="bundle.js"></script>
</body>

</html>
